<!DOCTYPE html>
<html lang="zh-TW" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祐玄 (yushenofficial) 極致監測面板</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- TMI.js -->
    <script src="https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/tmi.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        twitch: {
                            DEFAULT: '#9146FF',
                            accent: '#00e5ff',
                            dark: '#08080a',
                            card: '#121214'
                        }
                    },
                    animation: {
                        'spin-slow': 'spin 3s linear infinite',
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: #08080a;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(145, 70, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 229, 255, 0.05) 0%, transparent 40%);
            min-height: 100vh;
            color: #e4e4e7;
            overflow-x: hidden;
        }

        .premium-card {
            background: rgba(18, 18, 20, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .live-glow {
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
            border: 2px solid #ef4444 !important;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(145, 70, 255, 0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(145, 70, 255, 0.5); }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(to bottom, transparent, #9146FF, transparent);
            animation: scan 4s linear infinite;
        }
    </style>
</head>

<body class="p-4 md:p-10">
    <!-- Top Bar -->
    <div class="max-w-5xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-4 bg-twitch-card px-6 py-3 rounded-2xl border border-white/5">
            <i data-lucide="shield-check" class="w-5 h-5 text-twitch-accent"></i>
            <div>
                <div class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500">System Mode</div>
                <div class="text-sm font-bold">自動揪團追蹤 v3.5 <span class="text-twitch">PRO</span></div>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-right">
                <div id="clock-date" class="text-[10px] font-black text-gray-500 uppercase tracking-widest">2026.04.26</div>
                <div id="clock-time" class="text-2xl font-black text-white tracking-tighter">04:43:00</div>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Left: Status Panel -->
        <div class="lg:col-span-5 space-y-6">
            <div id="main-status-card" class="premium-card rounded-[3rem] p-8 relative overflow-hidden transition-all duration-500">
                <div class="scan-line absolute inset-x-0 opacity-20 pointer-events-none"></div>
                
                <div class="flex flex-col items-center text-center">
                    <!-- Avatar -->
                    <div class="relative mb-6">
                        <div id="avatar-ring" class="w-36 h-36 md:w-44 md:h-44 rounded-full border-4 border-white/5 p-1.5 transition-all duration-700">
                            <img id="user-avatar" src="https://ui-avatars.com/api/?name=Y&background=18181b&color=9146FF" class="w-full h-full rounded-full object-cover">
                        </div>
                        <div id="live-badge" class="absolute -bottom-2 left-1/2 -translate-x-1/2 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em] z-20 border-2 border-[#08080a] bg-gray-600">
                            Offline
                        </div>
                    </div>

                    <h1 class="text-3xl md:text-4xl font-black italic tracking-tighter mb-2">yushenofficial</h1>
                    <div id="stream-title" class="text-sm text-gray-500 font-bold leading-relaxed mb-6 italic min-h-[40px]">
                        正在等待伺服器回應...
                    </div>

                    <div class="grid grid-cols-2 gap-3 w-full">
                        <div class="bg-white/5 rounded-2xl p-4 border border-white/5">
                            <div class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-1">Viewers</div>
                            <div id="viewer-count" class="text-xl font-black">0</div>
                        </div>
                        <div class="bg-white/5 rounded-2xl p-4 border border-white/5">
                            <div class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-1">Status</div>
                            <div id="api-status" class="text-xs font-bold text-twitch-accent">連線中...</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Connections Status -->
            <div class="premium-card rounded-[2rem] p-6 space-y-4">
                <h3 class="text-xs font-black uppercase tracking-widest text-gray-500 flex items-center gap-2">
                    <i data-lucide="activity" class="w-4 h-4"></i> 連線狀態
                </h3>
                <div class="space-y-3">
                    <div class="flex justify-between items-center text-xs">
                        <span class="text-gray-400 font-bold">Twitch Helix API</span>
                        <span id="helix-led" class="w-2 h-2 rounded-full bg-yellow-500 shadow-[0_0_10px_rgba(234,179,8,0.5)]"></span>
                    </div>
                    <div class="flex justify-between items-center text-xs">
                        <span class="text-gray-400 font-bold">IRC Chat Server (TMI)</span>
                        <span id="tmi-led" class="w-2 h-2 rounded-full bg-red-500"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right: Raid History -->
        <div class="lg:col-span-7">
            <div class="premium-card rounded-[3rem] overflow-hidden flex flex-col h-full min-h-[600px]">
                <div class="p-8 border-b border-white/5 bg-gradient-to-r from-twitch/5 to-transparent flex justify-between items-center">
                    <div>
                        <h2 class="text-2xl font-black italic tracking-tighter">RAID HISTORY</h2>
                        <p class="text-[10px] text-gray-500 font-black uppercase tracking-widest">祐玄的揪團自動監測紀錄</p>
                    </div>
                    <button onclick="clearHistory()" class="p-3 hover:bg-red-500/10 rounded-xl text-gray-600 hover:text-red-400 transition-all active:scale-95">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                </div>

                <div id="raid-list" class="flex-1 overflow-y-auto p-6 md:p-8 space-y-4 custom-scrollbar">
                    <!-- Dynamic -->
                    <div class="flex flex-col items-center justify-center py-20 text-center opacity-20">
                        <i data-lucide="radar" class="w-16 h-16 mb-4 animate-pulse"></i>
                        <div class="text-sm font-bold italic tracking-wider">正在監聽揪團事件...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-8 left-8 z-[100] space-y-3"></div>

    <script>
        const TARGET = 'yushenofficial';
        const CONFIG = {
            clientId: '3llrahqqu4s0gi17eehtoft8g60may',
            clientSecret: 'dyvy4obvo5p8yu0p01h8cvayjji4yf',
            token: null
        };

        // --- Clock ---
        function updateClock() {
            const now = new Date();
            document.getElementById('clock-date').innerText = now.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '.');
            document.getElementById('clock-time').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- Twitch Helix ---
        async function fetchToken() {
            try {
                const res = await fetch(`https://id.twitch.tv/oauth2/token?client_id=${CONFIG.clientId}&client_secret=${CONFIG.clientSecret}&grant_type=client_credentials`, { method: 'POST' });
                const d = await res.json();
                CONFIG.token = d.access_token;
                document.getElementById('helix-led').className = 'w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.5)]';
                return d.access_token;
            } catch (e) {
                document.getElementById('helix-led').className = 'w-2 h-2 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]';
                return null;
            }
        }

        async function refreshStatus() {
            if (!CONFIG.token) await fetchToken();
            if (!CONFIG.token) return;

            try {
                const [uRes, sRes] = await Promise.all([
                    fetch(`https://api.twitch.tv/helix/users?login=${TARGET}`, { headers: { 'Client-ID': CONFIG.clientId, 'Authorization': `Bearer ${CONFIG.token}` } }),
                    fetch(`https://api.twitch.tv/helix/streams?user_login=${TARGET}`, { headers: { 'Client-ID': CONFIG.clientId, 'Authorization': `Bearer ${CONFIG.token}` } })
                ]);

                const u = await uRes.json();
                const s = await sRes.json();

                if (u.data?.[0]) {
                    document.getElementById('user-avatar').src = u.data[0].profile_image_url;
                }

                const badge = document.getElementById('live-badge');
                const title = document.getElementById('stream-title');
                const vCount = document.getElementById('viewer-count');
                const card = document.getElementById('main-status-card');
                const ring = document.getElementById('avatar-ring');

                if (s.data?.[0]) {
                    const info = s.data[0];
                    badge.innerText = 'LIVE';
                    badge.className = 'absolute -bottom-2 left-1/2 -translate-x-1/2 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em] z-20 border-2 border-[#08080a] bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)]';
                    title.innerText = info.title;
                    title.className = 'text-sm text-twitch-accent font-black leading-relaxed mb-6 italic min-h-[40px]';
                    vCount.innerText = info.viewer_count.toLocaleString();
                    card.classList.add('live-glow');
                    ring.classList.add('border-red-500', 'animate-pulse-slow');
                    document.getElementById('api-status').innerText = '實況進行中';
                } else {
                    badge.innerText = 'Offline';
                    badge.className = 'absolute -bottom-2 left-1/2 -translate-x-1/2 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em] z-20 border-2 border-[#08080a] bg-gray-600';
                    title.innerText = '目前尚未開台';
                    title.className = 'text-sm text-gray-500 font-bold leading-relaxed mb-6 italic min-h-[40px]';
                    vCount.innerText = '0';
                    card.classList.remove('live-glow');
                    ring.classList.remove('border-red-500', 'animate-pulse-slow');
                    document.getElementById('api-status').innerText = '伺服器已連接';
                }
            } catch (e) {
                console.error(e);
            }
        }

        // --- TMI IRC ---
        const client = new tmi.Client({ channels: [TARGET] });
        client.on('usernotice', (chan, user, msg, self) => {
            if (user['msg-id'] === 'raid') {
                const name = user['msg-param-displayName'] || user['msg-param-login'];
                const count = parseInt(user['msg-param-viewerCount']) || 0;
                processRaid(name, user['msg-param-login'], count);
            }
        });
        client.on('connected', () => {
            document.getElementById('tmi-led').className = 'w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.5)]';
            showToast('聊天室伺服器連線成功');
        });
        client.on('disconnected', () => {
            document.getElementById('tmi-led').className = 'w-2 h-2 rounded-full bg-red-500';
        });
        client.connect().catch(console.error);

        // --- Logic ---
        function processRaid(name, id, count) {
            const logs = JSON.parse(localStorage.getItem('yushen_final_raid_v2') || '[]');
            const now = new Date();
            const entry = {
                name, id, count,
                ts: now.getTime(),
                time: now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }),
                date: now.toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit' })
            };
            logs.unshift(entry);
            if (logs.length > 50) logs.pop();
            localStorage.setItem('yushen_final_raid_v2', JSON.stringify(logs));
            renderList();
            showToast(`🔥 偵測到揪團：${name} (${count}人)`);
        }

        function renderList() {
            const container = document.getElementById('raid-list');
            const logs = JSON.parse(localStorage.getItem('yushen_final_raid_v2') || '[]');

            if (logs.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-center opacity-20">
                        <i data-lucide="radar" class="w-16 h-16 mb-4 animate-pulse"></i>
                        <div class="text-sm font-bold italic tracking-wider">正在監聽揪團事件...</div>
                    </div>`;
                lucide.createIcons({ root: container });
                return;
            }

            container.innerHTML = logs.map(raid => `
                <div class="premium-card rounded-3xl p-5 flex items-center justify-between group hover:bg-white/5 transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-twitch/10 rounded-2xl flex items-center justify-center text-twitch font-black text-xl">
                            ${raid.name.charAt(0)}
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="font-black text-white italic tracking-tight">${raid.name}</span>
                                <a href="https://twitch.tv/${raid.id}" target="_blank" class="text-gray-600 hover:text-twitch-accent"><i data-lucide="external-link" class="w-3.5 h-3.5"></i></a>
                            </div>
                            <div class="text-[9px] font-black text-gray-500 uppercase tracking-widest mt-1">
                                ${raid.date} ${raid.time}
                            </div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-2xl font-black text-twitch-accent italic">${raid.count.toLocaleString()}</div>
                        <div class="text-[8px] font-black text-gray-600 uppercase tracking-[0.2em]">Viewers</div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons({ root: container });
        }

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const div = document.createElement('div');
            div.className = 'bg-twitch-card border border-twitch/30 px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 animate-modal-in';
            div.innerHTML = `<i data-lucide="bell" class="w-4 h-4 text-twitch-accent"></i> <span class="text-xs font-bold">${msg}</span>`;
            container.appendChild(div);
            lucide.createIcons({ root: div });
            setTimeout(() => {
                div.style.opacity = '0';
                div.style.transform = 'translateY(10px)';
                div.style.transition = 'all 0.5s ease-out';
                setTimeout(() => div.remove(), 500);
            }, 3000);
        }

        window.clearHistory = function() {
            if(confirm('確定清除歷史紀錄？')) {
                localStorage.removeItem('yushen_final_raid_v2');
                renderList();
            }
        };

        // Init
        renderList();
        refreshStatus();
        setInterval(refreshStatus, 60000);
        lucide.createIcons();
    </script>
</body>

</html>
